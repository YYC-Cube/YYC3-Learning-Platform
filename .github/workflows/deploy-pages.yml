name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  build:
    name: Build Static Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Patch for static export
        run: |
          cat > app/providers/DynamicProviders.tsx << 'EOFILE'
          "use client"
          export { default as BottomNav } from "@/components/bottom-nav"
          export { default as AIAssistantProvider } from "@/app/providers/AIAssistantProvider"
          export { default as PerformanceMonitor } from "@/components/PerformanceMonitor"
          EOFILE
          rm -rf app/api
          rm -rf app/courses/\[id\]
          rm -rf app/exam/\[id\]
          rm -f middleware.ts
          cp next.config.js next.config.js.bak
          node scripts/patch-export.js

      - name: Build for GitHub Pages (static export)
        env:
          NEXT_PUBLIC_APP_URL: https://learning.yyc3.top
          NEXT_PUBLIC_API_URL: https://learning.yyc3.top/api
          NODE_ENV: production
          JWT_SECRET: pages-build-dummy-key-at-least-32-characters-long
          JWT_EXPIRES_IN: 7d
          BCRYPT_ROUNDS: 10
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: dummy
          DB_PASS: dummy-dummy-password-not-real
          DB_NAME: dummy
        run: |
          pnpm build
          mv next.config.js.bak next.config.js

      - name: Add CNAME
        run: echo "learning.yyc3.top" > out/CNAME

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    name: Deploy to Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
